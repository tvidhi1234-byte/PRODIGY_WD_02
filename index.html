
<section class="stopwatch-section" id="stopwatch">

    <div class="stopwatch-card">

        <h2>Velune Stopwatch</h2>

        <div id="display">
            00 : 00 : 00 : 000
        </div>

        <div class="controls">

            <button onclick="startTimer()">
                Start
            </button>

            <button onclick="pauseTimer()">
                Pause
            </button>

            <button onclick="resetTimer()">
                Reset
            </button>

            <button onclick="addLap()">
                Lap
            </button>

        </div>

        <div class="stats">

            <div>
                <h3 id="lapCount">0</h3>
                <p>Total Laps</p>
            </div>

            <div>
                <h3 id="bestLap">--</h3>
                <p>Fastest Lap</p>
            </div>

        </div>

        <div class="laps" id="laps">
        </div>

    </div>

</section>
