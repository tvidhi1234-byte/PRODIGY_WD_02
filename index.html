```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velune Stopwatch</title>

    
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="stopwatch-section" id="stopwatch">

        <div class="stopwatch-card">

            <h2>⏱ Velune Stopwatch</h2>

            <!-- Stopwatch Display -->
            <div id="display">
                00 : 00 : 00 : 000
            </div>

            <!-- Control Buttons -->
            <div class="controls">

                <button id="startBtn">
                    ▶ Start
                </button>

                <button id="pauseBtn">
                    ⏸ Pause
                </button>

                <button id="resetBtn">
                    ↺ Reset
                </button>

                <button id="lapBtn">
                    ⏺ Lap
                </button>

            </div>

            <!-- Statistics -->
            <div class="stats">

                <div class="stat-box">
                    <h3 id="lapCount">0</h3>
                    <p>Total Laps</p>
                </div>

                <div class="stat-box">
                    <h3 id="bestLap">--</h3>
                    <p>Fastest Lap</p>
                </div>

            </div>

            <!-- Lap Records -->
            <div class="laps" id="laps">

                <!-- Laps will be added dynamically here -->

            </div>

        </div>

    </section>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
```
